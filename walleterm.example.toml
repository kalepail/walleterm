[app]
default_network = "testnet"
strict_onchain = true
onchain_signer_mode = "subset" # or "exact"
default_ttl_seconds = 30
assumed_ledger_time_seconds = 6
default_submit_mode = "sign-only" # sign-only | channels

[networks.testnet]
rpc_url = "https://soroban-rpc.testnet.stellar.gateway.fm"
network_passphrase = "Test SDF Network ; September 2015"
indexer_url = "https://smart-account-indexer.sdf-ecosystem.workers.dev"
channels_base_url = "https://channels.openzeppelin.com/testnet"
channels_api_key_ref = "op://Private/walleterm-testnet/channels_api_key"
# Optional: only set if you intentionally store a non-default deployer seed.
# If omitted, wallet create uses the smart-account-kit deterministic deployer.
# deployer_secret_ref = "op://Private/walleterm-testnet/deployer_seed"

[networks.mainnet]
rpc_url = "https://rpc.lightsail.network/"
network_passphrase = "Public Global Stellar Network ; September 2015"
indexer_url = "https://smart-account-indexer-mainnet.sdf-ecosystem.workers.dev"
channels_base_url = "https://channels.openzeppelin.com"
channels_api_key_ref = "op://Private/walleterm-mainnet/channels_api_key"
# Optional: only set if you intentionally store a non-default deployer seed.
# deployer_secret_ref = "op://Private/walleterm-mainnet/deployer_seed"

